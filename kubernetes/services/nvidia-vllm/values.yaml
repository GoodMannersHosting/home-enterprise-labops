# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
defaultPodOptions:
  automountServiceAccountToken: false
  enableServiceLinks: false
  restartPolicy: Always
  dnsPolicy: ClusterFirst
  runtimeClassName: nvidia
  securityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

controllers:
  main:
    enabled: true
    type: deployment
    replicas: 1
    revisionHistoryLimit: 2
    containers:
      core:
        ports:
          - name: http
            containerPort: &port 8080
            protocol: TCP
        image:
          repository: ghcr.io/ggml-org/llama.cpp
          tag: server-cuda12
          pullPolicy: Always
        args:
          - --hf-repo
          - unsloth/Qwen3.6-35B-A3B-GGUF
          - --hf-file
          - Qwen3.6-35B-A3B-UD-Q6_K_XL.gguf
          # Spec Settings
          - --spec-type
          - "ngram-map-k"
          - --spec-draft-n-max
          - "48"
          - --spec-draft-n-min
          - "1"
          - --spec-ngram-simple-size-n
          - "16"
          - --spec-ngram-simple-size-m
          - "48"
          # Performance Settings
          - --fit
          - "on"
          # - --n-cpu-moe # disabling in favor of `--fit on`
          # - "99"
          # - --gpu-layers  # disabling in favor of `--fit on`
          # - "99"
          - --ctx-size
          - "131072"
          - --ctx-checkpoints
          - "16"
          - --flash-attn
          - "on"
          - --cache-type-k
          - q8_0
          - --cache-type-v
          - q8_0
          - --cpu-strict
          - "1"
          - --parallel
          - "1"
          - --cache-ram
          - "0"
          - --reasoning
          - "on"
          - --reasoning-budget
          - "-1"
          - --batch-size
          - "2048"
          - --ubatch-size
          - "128"
          - --threads
          - "16"
          # Enable Tooling
          - --tools
          - "all"
          # Tunings
          - --temperature
          - "0.6"
          - --top-k
          - "20"
          - --top-p
          - "0.95"
          - --min-p
          - "0.00"
          - --presence-penalty
          - "1.5"
          - --repeat-penalty
          - "1.0"
          # Enable Specific Settings
          - --no-mmap
          - --mlock
          - --jinja
          - --direct-io
        env:
          - name: LLAMA_ARG_HOST
            value: "0.0.0.0"
          - name: LLAMA_ARG_PORT
            value: "8080"
          - name: "LLAMA_ARG_UI"
            value: "off"
          - name: LD_LIBRARY_PATH
            value: /app
          - name: LLAMA_API_KEY
            valueFrom:
              secretKeyRef:
                name: nvidia-llm-api-key
                key: api-key
          - name: HF_HOME
            value: /cache/huggingface
        securityContext:
          allowPrivilegeEscalation: false
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: http
              initialDelaySeconds: 60
              periodSeconds: 30
              failureThreshold: 40
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: http
              initialDelaySeconds: 10
              periodSeconds: 15
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: http
              initialDelaySeconds: 30
              periodSeconds: 30
        resources:
          limits:
            nvidia.com/gpu: "1"
            memory: 48Gi
          requests:
            nvidia.com/gpu: "1"
            memory: 48Gi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File

service:
  core:
    enabled: true
    controller: main
    primary: true
    type: ClusterIP
    ports:
      http:
        enabled: true
        port: *port
        targetPort: http
        protocol: TCP
  public:
    enabled: true
    controller: main
    primary: false
    type: LoadBalancer
    externalTrafficPolicy: Cluster
    annotations:
      lbipam.cilium.io/ips: "172.31.0.36"
    ports:
      http:
        enabled: true
        port: *port
        targetPort: http
        protocol: TCP

persistence:
  cache:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ceph-block-retain
    accessMode: ReadWriteOnce
    size: 100Gi
    retain: true
    advancedMounts:
      main:
        core:
          - path: /cache/huggingface
            readOnly: false
  shm:
    enabled: true
    type: emptyDir
    medium: Memory
    sizeLimit: 16Gi
    advancedMounts:
      main:
        core:
          - path: /dev/shm
            readOnly: false
