---
defaultPodOptions:
  automountServiceAccountToken: false
  enableServiceLinks: true
  restartPolicy: Always
  nodeSelector:
    kubernetes.io/arch: amd64
  securityContext:
    fsGroupChangePolicy: OnRootMismatch

controllers:
  backend:
    pod:
      hostAliases:
        - ip: "172.31.0.10"
          hostnames:
            - "keycloak.cloud.danmanners.com"
    enabled: true
    type: statefulset
    replicas: 1
    revisionHistoryLimit: 2
    initContainers:
      create-storage-dirs:
        image:
          repository: "docker.io/library/busybox"
          tag: "1.38"
        env:
          - name: ARTIFACT_KEEPER_USER_ID
            value: "999"
          - name: ARTIFACT_KEEPER_GROUP_ID
            value: "999"
        command:
          - sh
          - -c
          - |
            # Get target UID/GID from environment variables
            TARGET_UID="${ARTIFACT_KEEPER_USER_ID:-999}"
            TARGET_GID="${ARTIFACT_KEEPER_GROUP_ID:-999}"
            echo "Target ownership: $TARGET_UID:$TARGET_GID"

            # Check /data permissions
            echo "Checking /data permissions..."
            ls -la /data || true

            # Check current ownership of /data
            DATA_UID=$(stat -c "%u" /data 2>/dev/null || stat -f "%u" /data 2>/dev/null || echo "")
            DATA_GID=$(stat -c "%g" /data 2>/dev/null || stat -f "%g" /data 2>/dev/null || echo "")
            echo "Current /data ownership: $DATA_UID:$DATA_GID"

            # Set ownership of entire /data directory to target UID/GID if there's a mismatch
            if [ "$DATA_UID" != "$TARGET_UID" ] || [ "$DATA_GID" != "$TARGET_GID" ]; then
              echo "Updating ownership of /data from $DATA_UID:$DATA_GID to $TARGET_UID:$TARGET_GID (recursive)"
              chown -R "$TARGET_UID:$TARGET_GID" /data || {
                echo "ERROR: Failed to chown /data"
                exit 1
              }
            else
              echo "Ownership of /data is correct ($TARGET_UID:$TARGET_GID)"
            fi

            # Ensure /data is writable (set permissions to 755 for directories, 644 for files)
            chmod -R u+rwX,go+rX /data || {
              echo "WARNING: Failed to set permissions on /data"
            }

            # Verify /data is writable
            if [ -w /data ]; then
              echo "SUCCESS: /data is writable"
            else
              echo "ERROR: /data is NOT writable after ownership change"
              exit 1
            fi

            # Final verification
            echo "Final /data directory structure:"
            ls -la /data || true

            # Scan workspace for Grype/Trivy artifact extraction
            mkdir -p /data/scan-workspace /data/.cache/grype /data/.docker-config /data/bin
            chown -R "$TARGET_UID:$TARGET_GID" /data/scan-workspace /data/.cache/grype /data/.docker-config /data/bin
      setup-grype-cache:
        image:
          repository: ghcr.io/artifact-keeper/artifact-keeper-backend
          tag: "dev"
          pullPolicy: "IfNotPresent"
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
        env:
          - name: GRYPE_DB_CACHE_DIR
            value: "/data/.cache/grype"
          - name: GRYPE_DB_AUTO_UPDATE
            value: "true"
          - name: GRYPE_DB_VALIDATE_AGE
            value: "false"
          - name: GRYPE_CHECK_FOR_APP_UPDATE
            value: "false"
        command:
          - sh
          - -c
          - |
            TARGET_UID="${ARTIFACT_KEEPER_USER_ID:-999}"
            TARGET_GID="${ARTIFACT_KEEPER_GROUP_ID:-999}"
            mkdir -p /data/.cache/grype /data/scan-workspace
            if [ -d /home/artifact/.cache/grype ]; then
              echo "Copying pre-seeded Grype vulnerability DB..."
              cp -a /home/artifact/.cache/grype/. /data/.cache/grype/ || true
            fi
            if ! find /data/.cache/grype -name vulnerability.db 2>/dev/null | grep -q .; then
              echo "Downloading Grype vulnerability DB..."
              grype db update || {
                echo "WARNING: Grype DB update failed"
                exit 0
              }
            fi
            chown -R "$TARGET_UID:$TARGET_GID" /data/.cache/grype /data/scan-workspace
            echo "Grype cache ready"
      setup-grype-wrapper:
        image:
          repository: ghcr.io/artifact-keeper/artifact-keeper-backend
          tag: "dev"
          pullPolicy: "IfNotPresent"
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
        command:
          - sh
          - -c
          - |
            TARGET_UID="${ARTIFACT_KEEPER_USER_ID:-999}"
            TARGET_GID="${ARTIFACT_KEEPER_GROUP_ID:-999}"
            mkdir -p /data/bin
            # Grype 0.112+ emits artifact.licenses as string[]; Artifact Keeper's
            # parser expects {value, spdxExpression} objects. Wrapper lives on the
            # shared PVC because init-container FS changes don't carry over.
            cat > /data/bin/grype << 'EOF'
            #!/bin/sh
            set -e
            case "$1" in
              version|--version|-v|db) exec /usr/local/bin/grype "$@" ;;
            esac
            out=$(mktemp)
            trap 'rm -f "$out"' EXIT INT TERM
            set +e
            /usr/local/bin/grype "$@" > "$out"
            status=$?
            set -e
            if [ "$status" -ne 0 ]; then
              cat "$out" >&2
              exit "$status"
            fi
            if grep -q '"licenses"' "$out"; then
              jq '.matches |= map(
                if .artifact.licenses then
                  .artifact.licenses |= map(
                    if type == "string" then {value: ., spdxExpression: .} else . end
                  )
                else . end
              )' "$out"
            else
              cat "$out"
            fi
            EOF
            chmod +x /data/bin/grype
            chown -R "$TARGET_UID:$TARGET_GID" /data/bin
            echo "Grype wrapper installed at /data/bin/grype"
      wait-for-db:
        image:
          repository: docker.io/library/busybox
          tag: "1.38"
        command:
          - sh
          - -c
          - |
            until nc -z -v -w30 db-rw.database.svc.cluster.local 5432
            do
              echo "Waiting for database connection..."
              sleep 5
            done
            echo "Database is up - continuing..."
      init-db:
        image:
          repository: ghcr.io/home-operations/postgres-init
          tag: "17.6"
        env:
          - name: INIT_POSTGRES_DBNAME
            value: artifact_registry
          - name: INIT_POSTGRES_HOST
            value: db-rw.database.svc.cluster.local
          - name: INIT_POSTGRES_SUPER_PASS
            valueFrom:
              secretKeyRef:
                name: db-superuser
                key: password
          - name: INIT_POSTGRES_USER
            valueFrom:
              secretKeyRef:
                name: artifact-keeper-database-credentials
                key: username
          - name: INIT_POSTGRES_PASS
            valueFrom:
              secretKeyRef:
                name: artifact-keeper-database-credentials
                key: password
      fix-oci-paths:
        image:
          repository: docker.io/library/postgres
          tag: "17-alpine"
        env:
          - name: PGUSER
            valueFrom:
              secretKeyRef:
                name: artifact-keeper-database-credentials
                key: username
          - name: PGPASSWORD
            valueFrom:
              secretKeyRef:
                name: artifact-keeper-database-credentials
                key: password
        command:
          - sh
          - -c
          - |
            # Artifact Keeper stores OCI paths as v2/<image>/manifests/<tag> but
            # serves them at v2/<repo-key>/<image>/manifests/<tag>. Grype registry
            # mode needs the served path; prefix repo key when missing (#1160).
            psql -h db-rw.database.svc.cluster.local -d artifact_registry -v ON_ERROR_STOP=1 <<'EOSQL'
            UPDATE artifacts a
            SET path = format(
                  'v2/%s/%s/manifests/%s',
                  r.key,
                  split_part(substring(a.path from 4), '/', 1),
                  split_part(a.path, '/manifests/', 2)
                ),
                updated_at = NOW()
            FROM repositories r
            WHERE a.repository_id = r.id
              AND a.path LIKE 'v2/%/manifests/%'
              AND a.path NOT LIKE 'v2/' || r.key || '/%';
            EOSQL
            echo "OCI artifact paths reconciled"
      bootstrap-dtrack:
        image:
          repository: docker.io/library/alpine
          tag: "3.24"
        env:
          - name: DEPENDENCY_TRACK_URL
            value: http://artifact-keeper-dependency-track:8080
          - name: DEPENDENCY_TRACK_ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: artifact-keeper-dependency-track-credentials
                key: admin-password
        command:
          - /bin/sh
          - -c
          - |
            apk add --no-cache curl jq >/dev/null 2>&1
            /bin/sh /scripts/init-dtrack.sh
    containers:
      main:
        ports:
          - name: http
            containerPort: 8080
            protocol: TCP
        image:
          repository: &akb "ghcr.io/artifact-keeper/artifact-keeper-backend"
          tag: &akbTag "dev"
          pullPolicy: "Always"
        securityContext:
          allowPrivilegeEscalation: false
          runAsUser: &id 999
          runAsGroup: *id
        command:
          - /bin/sh
          - -c
        args:
          - |
            export PATH="/data/bin:$PATH"
            if [ -f /shared/dtrack-api-key ] && [ -s /shared/dtrack-api-key ]; then
              export DEPENDENCY_TRACK_API_KEY="$(cat /shared/dtrack-api-key)"
            fi
            # Grype reads registry credentials from DOCKER_CONFIG, not the URL.
            export DOCKER_CONFIG=/data/.docker-config
            mkdir -p "$DOCKER_CONFIG"
            if [ -n "${ADMIN_PASSWORD:-}" ]; then
              AUTH="$(printf 'admin:%s' "$ADMIN_PASSWORD" | base64 -w0 2>/dev/null || printf 'admin:%s' "$ADMIN_PASSWORD" | base64)"
              printf '{"auths":{"localhost:8080":{"auth":"%s"}}}\n' "$AUTH" \
                > "$DOCKER_CONFIG/config.json"
            fi
            exec /usr/local/bin/artifact-keeper
        env:
          # Database Configuration
          - name: ARTIFACT_KEEPER_DB_USER
            valueFrom:
              secretKeyRef:
                name: artifact-keeper-database-credentials
                key: username
          - name: ARTIFACT_KEEPER_DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: artifact-keeper-database-credentials
                key: password
          - name: DATABASE_URL
            value: "postgresql://$(ARTIFACT_KEEPER_DB_USER):$(ARTIFACT_KEEPER_DB_PASSWORD)@db-rw.database.svc.cluster.local:5432/artifact_registry"
          # JWT Secret
          - name: JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: artifact-keeper-jwt-secret
                key: jwt-secret
          # Admin Password (optional, to skip first-boot setup)
          - name: ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: artifact-keeper-admin-password
                key: password
          # Server Configuration
          - name: HOST
            value: "0.0.0.0"
          - name: PORT
            value: "8080"
          # Storage Configuration
          - name: STORAGE_BACKEND
            value: "filesystem"
          - name: STORAGE_PATH
            value: "/data/storage"
          - name: PLUGINS_DIR
            value: "/data/plugins"
          # Search (OpenSearch replaced Meilisearch in Artifact Keeper 1.2+)
          - name: OPENSEARCH_URL
            value: "http://artifact-keeper-opensearch:9200"
          - name: OPENSEARCH_ALLOW_INVALID_CERTS
            value: "true"
          # Security Scanning
          - name: TRIVY_ENABLED
            value: "true"
          - name: TRIVY_URL
            value: "http://artifact-keeper-trivy:8090"
          - name: SCAN_WORKSPACE_PATH
            value: "/data/scan-workspace"
          - name: GRYPE_DB_CACHE_DIR
            value: "/data/.cache/grype"
          - name: GRYPE_DB_AUTO_UPDATE
            value: "true"
          - name: GRYPE_DB_VALIDATE_AGE
            value: "false"
          - name: GRYPE_CHECK_FOR_APP_UPDATE
            value: "false"
          - name: AK_GRYPE_REGISTRY_HOST
            value: "localhost:8080"
          - name: DOCKER_CONFIG
            value: "/data/.docker-config"
          # Dependency-Track SBOM analysis
          - name: DEPENDENCY_TRACK_URL
            value: "http://artifact-keeper-dependency-track:8080"
          - name: DEPENDENCY_TRACK_ENABLED
            value: "true"
          - name: ALLOW_HTTP_INTEGRATIONS
            value: "true"
          # Logging
          - name: RUST_LOG
            value: "info,artifact_keeper=debug"
        resources:
          limits:
            cpu: 2
            memory: 4Gi
          requests:
            cpu: 250m
            memory: 512Mi
        probes:
          liveness: &backendProbes
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: http
              initialDelaySeconds: 10
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
          readiness: *backendProbes

  web:
    enabled: true
    type: deployment
    replicas: 1
    revisionHistoryLimit: 2
    containers:
      main:
        ports:
          - name: http
            containerPort: 3000
            protocol: TCP
        image:
          repository: ghcr.io/artifact-keeper/artifact-keeper-web
          tag: "dev"
          pullPolicy: "Always"
        securityContext:
          allowPrivilegeEscalation: false
        env:
          - name: NEXT_PUBLIC_API_URL
            value: "https://registry.cloud.danmanners.com/api"
          - name: BACKEND_URL
            value: "http://artifact-keeper-backend:80"
        resources:
          limits:
            cpu: 1
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 256Mi
        probes:
          liveness: &webProbes
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: http
              initialDelaySeconds: 10
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
          readiness: *webProbes

  opensearch:
    enabled: true
    type: deployment
    replicas: 1
    strategy: Recreate
    revisionHistoryLimit: 2
    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    initContainers:
      fix-ownership:
        image:
          repository: docker.io/library/busybox
          tag: "1.38"
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
        command:
          - sh
          - -c
          - chown -R 1000:1000 /usr/share/opensearch/data
    containers:
      main:
        ports:
          - name: http
            containerPort: 9200
            protocol: TCP
        image:
          repository: opensearchproject/opensearch
          tag: "2.19.5"
          pullPolicy: "IfNotPresent"
        securityContext:
          allowPrivilegeEscalation: false
        env:
          - name: cluster.name
            value: artifact-keeper
          - name: discovery.type
            value: single-node
          - name: bootstrap.memory_lock
            value: "false"
          - name: OPENSEARCH_JAVA_OPTS
            value: "-Xms512m -Xmx512m"
          - name: DISABLE_INSTALL_DEMO_CONFIG
            value: "true"
          - name: DISABLE_SECURITY_PLUGIN
            value: "true"
        resources:
          limits:
            cpu: 2
            memory: 2Gi
          requests:
            cpu: 250m
            memory: 1Gi
        probes:
          liveness: &opensearchProbes
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: http
              initialDelaySeconds: 60
              periodSeconds: 20
              timeoutSeconds: 5
              failureThreshold: 5
          readiness: &opensearchReadiness
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /_cluster/health?local=true
                port: http
              initialDelaySeconds: 20
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 10

  trivy:
    enabled: true
    type: deployment
    replicas: 1
    strategy: Recreate
    revisionHistoryLimit: 2
    containers:
      main:
        ports:
          - name: http
            containerPort: 8090
            protocol: TCP
        image:
          repository: aquasec/trivy
          tag: "0.62.1"
          pullPolicy: "IfNotPresent"
        securityContext:
          allowPrivilegeEscalation: false
          # runAsNonRoot: true
          # runAsUser: *id
        args:
          - server
          - --listen
          - 0.0.0.0:8090
          - --cache-dir
          - /root/.cache/trivy
        resources:
          limits:
            cpu: 1
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 256Mi
        probes:
          liveness: &trivyProbes
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: http
              initialDelaySeconds: 10
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
          readiness: *trivyProbes

  dependency-track:
    enabled: true
    type: deployment
    replicas: 1
    strategy: Recreate
    revisionHistoryLimit: 2
    annotations:
      argocd.argoproj.io/sync-wave: "1"
    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    initContainers:
      wait-for-db:
        image:
          repository: docker.io/library/busybox
          tag: "1.38"
        command:
          - sh
          - -c
          - |
            until nc -z -v -w30 db-rw.database.svc.cluster.local 5432
            do
              echo "Waiting for database connection..."
              sleep 5
            done
      init-db:
        image:
          repository: ghcr.io/home-operations/postgres-init
          tag: "17.6"
        env:
          - name: INIT_POSTGRES_DBNAME
            value: dependency_track
          - name: INIT_POSTGRES_HOST
            value: db-rw.database.svc.cluster.local
          - name: INIT_POSTGRES_SUPER_PASS
            valueFrom:
              secretKeyRef:
                name: db-superuser
                key: password
          - name: INIT_POSTGRES_USER
            valueFrom:
              secretKeyRef:
                name: artifact-keeper-database-credentials
                key: username
          - name: INIT_POSTGRES_PASS
            valueFrom:
              secretKeyRef:
                name: artifact-keeper-database-credentials
                key: password
    containers:
      main:
        ports:
          - name: http
            containerPort: 8080
            protocol: TCP
        image:
          repository: dependencytrack/apiserver
          tag: "4.11.4"
          pullPolicy: "IfNotPresent"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
        env:
          - name: ALPINE_DATABASE_MODE
            value: external
          - name: ALPINE_DATABASE_URL
            value: "jdbc:postgresql://db-rw.database.svc.cluster.local:5432/dependency_track"
          - name: ALPINE_DATABASE_DRIVER
            value: org.postgresql.Driver
          - name: ALPINE_DATABASE_USERNAME
            valueFrom:
              secretKeyRef:
                name: artifact-keeper-database-credentials
                key: username
          - name: ALPINE_DATABASE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: artifact-keeper-database-credentials
                key: password
          - name: ALPINE_DATA_DIRECTORY
            value: /data
          - name: ALPINE_ENFORCE_AUTHENTICATION
            value: "true"
          - name: ALPINE_CORS_ENABLED
            value: "true"
          - name: ALPINE_CORS_ALLOW_ORIGIN
            value: "*"
          - name: JAVA_OPTIONS
            value: "-Xmx4g"
        resources:
          limits:
            cpu: 2
            memory: 6Gi
          requests:
            cpu: 500m
            memory: 4Gi
        probes:
          liveness: &dtrackProbes
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - wget
                  - -q
                  - --spider
                  - http://localhost:8080/api/version
              initialDelaySeconds: 90
              periodSeconds: 30
              timeoutSeconds: 10
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - wget
                  - -q
                  - --spider
                  - http://localhost:8080/api/version
              initialDelaySeconds: 60
              periodSeconds: 30
              timeoutSeconds: 10
              failureThreshold: 5

service:
  backend:
    enabled: true
    controller: backend
    primary: true
    type: ClusterIP
    ports:
      http:
        enabled: true
        port: 80
        targetPort: http
        protocol: TCP

  web:
    enabled: true
    controller: web
    primary: false
    type: ClusterIP
    ports:
      http:
        enabled: true
        port: 80
        targetPort: http
        protocol: TCP

  opensearch:
    enabled: true
    controller: opensearch
    primary: false
    type: ClusterIP
    ports:
      http:
        enabled: true
        port: 9200
        targetPort: http
        protocol: TCP

  trivy:
    enabled: true
    controller: trivy
    primary: false
    type: ClusterIP
    ports:
      http:
        enabled: true
        port: 8090
        targetPort: http
        protocol: TCP

  dependency-track:
    enabled: true
    controller: dependency-track
    primary: false
    type: ClusterIP
    ports:
      http:
        enabled: true
        port: 8080
        targetPort: http
        protocol: TCP

  extname:
    enabled: true
    primary: false
    controller: web
    type: ExternalName
    externalName: unifi-home.homelab.danmanners.com
    annotations:
      external-dns.alpha.kubernetes.io/hostname: registry.cloud.danmanners.com
      external-dns.alpha.kubernetes.io/ttl: "300"

rawResources:
  backend-service:
    enabled: true
    apiVersion: v1
    kind: Service
    spec:
      metadata:
        name: backend
        namespace: artifact-keeper
      spec:
        type: ClusterIP
        selector:
          app.kubernetes.io/controller: backend
          app.kubernetes.io/instance: artifact-keeper
          app.kubernetes.io/name: artifact-keeper
        ports:
          - name: http
            port: 8080
            targetPort: http
            protocol: TCP

route:
  web:
    enabled: false

configMaps:
  dtrack-init:
    enabled: true
    data:
      init-dtrack.sh: |
        #!/bin/sh
        set -e
        DT_URL="${DEPENDENCY_TRACK_URL:-http://artifact-keeper-dependency-track:8080}"
        DT_ADMIN_USER="admin"
        DT_DEFAULT_PASS="admin"
        DT_NEW_PASS="${DEPENDENCY_TRACK_ADMIN_PASSWORD}"
        API_KEY_FILE="/shared/dtrack-api-key"

        echo "[dtrack-init] Waiting for Dependency-Track at $DT_URL ..."
        for i in $(seq 1 60); do
          if curl -sf "$DT_URL/api/version" > /dev/null 2>&1; then break; fi
          if [ "$i" -eq 60 ]; then echo "[dtrack-init] ERROR: timeout"; exit 1; fi
          sleep 5
        done

        TOKEN=$(curl -sf -X POST "$DT_URL/api/v1/user/login" \
          -H "Content-Type: application/x-www-form-urlencoded" \
          -d "username=${DT_ADMIN_USER}&password=${DT_NEW_PASS}" 2>/dev/null || true)

        if [ -z "$TOKEN" ] || echo "$TOKEN" | grep -qi "FORCE_PASSWORD_CHANGE"; then
          curl -sf -o /dev/null -X POST "$DT_URL/api/v1/user/forceChangePassword" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "username=${DT_ADMIN_USER}&password=${DT_DEFAULT_PASS}&newPassword=${DT_NEW_PASS}&confirmPassword=${DT_NEW_PASS}"
          TOKEN=$(curl -sf -X POST "$DT_URL/api/v1/user/login" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "username=${DT_ADMIN_USER}&password=${DT_NEW_PASS}" 2>/dev/null || true)
        fi

        if [ -z "$TOKEN" ]; then echo "[dtrack-init] ERROR: auth failed"; exit 1; fi

        AUTOMATION_UUID=$(curl -sf "$DT_URL/api/v1/team" \
          -H "Authorization: Bearer $TOKEN" | \
          jq -r '.[] | select(.name == "Automation") | .uuid // empty')
        if [ -z "$AUTOMATION_UUID" ]; then echo "[dtrack-init] ERROR: Automation team not found"; exit 1; fi

        # Automation team needs project-creation and read rights; DT ships with BOM_UPLOAD only.
        for perm in PORTFOLIO_MANAGEMENT PROJECT_CREATION_UPLOAD BOM_UPLOAD VIEW_PORTFOLIO VIEW_POLICY_VIOLATION VIEW_VULNERABILITY; do
          curl -sf -o /dev/null -X POST "$DT_URL/api/v1/permission/${perm}/team/${AUTOMATION_UUID}" \
            -H "Authorization: Bearer $TOKEN" || true
        done

        if [ -f "$API_KEY_FILE" ] && [ -s "$API_KEY_FILE" ]; then
          if curl -sf -H "X-Api-Key: $(cat "$API_KEY_FILE")" "$DT_URL/api/v1/project" >/dev/null 2>&1; then
            echo "[dtrack-init] API key valid -- done"
            exit 0
          fi
          echo "[dtrack-init] Stored API key rejected -- regenerating"
        fi

        API_KEY=$(curl -sf -X PUT "$DT_URL/api/v1/team/${AUTOMATION_UUID}/key" \
          -H "Authorization: Bearer $TOKEN" \
          -H "Content-Type: application/json" | jq -r '.key // empty')

        if [ -z "$API_KEY" ]; then echo "[dtrack-init] ERROR: no API key"; exit 1; fi

        echo "$API_KEY" > "$API_KEY_FILE"
        echo "[dtrack-init] Done"

persistence:
  artifacts:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ceph-block-retain
    accessMode: ReadWriteOnce
    size: 100Gi
    retain: true
    advancedMounts:
      backend:
        main:
          - path: /data
            readOnly: false
        create-storage-dirs:
          - path: /data
            readOnly: false
        setup-grype-cache:
          - path: /data
            readOnly: false
        setup-grype-wrapper:
          - path: /data
            readOnly: false

  dtrack-shared:
