---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
defaultPodOptions:
  automountServiceAccountToken: false
  enableServiceLinks: false
  restartPolicy: Always
  nodeSelector:
    cpu-feature.node.kubevirt.io/avx2: "true"

controllers:
  main:
    enabled: true
    type: statefulset
    replicas: 1
    revisionHistoryLimit: 2
    pod:
      hostNetwork: false
      hostPID: false
      hostIPC: false
      dnsPolicy: ClusterFirst
    initContainers:
      copy-world-config:
        image:
          repository: busybox
          tag: latest
        command:
          - /bin/sh
          - -c
          - |
            mkdir -p /server-files/R5/Saved/SaveProfiles/Default/RocksDB/0.10.0/Worlds/E26150BE4D644A69B4BF0C154721B2D8
            cp /config/config.json /server-files/R5/Saved/SaveProfiles/Default/RocksDB/0.10.0/Worlds/E26150BE4D644A69B4BF0C154721B2D8/WorldDescription.json
            cp /config/ServerDescription.json /server-files/R5/Saved/SaveProfiles/Default/RocksDB/0.10.0/Worlds/E26150BE4D644A69B4BF0C154721B2D8/ServerDescription.json
    containers:
      main:
        ports:
          - name: game
            containerPort: 7777
            protocol: TCP
          - name: game-udp
            containerPort: 7777
            protocol: UDP
        image:
          repository: indifferentbroccoli/windrose-server-docker
          tag: "latest"
          pullPolicy: "Always"
        securityContext:
          allowPrivilegeEscalation: false
        env:
          - name: PUID
            value: "1000"
          - name: PGID
            value: "1000"
          - name: TZ
            value: "UTC"
          - name: UPDATE_ON_START
            value: "true"
          - name: USE_DIRECT_CONNECTION
            value: "true"
          - name: SERVER_PORT
            value: "7777"
          - name: SERVER_NAME
            value: "Biscuitrose"
          - name: MAX_PLAYERS
            value: "10"
          - name: USER_SELECTED_REGION
            value: "EU"
          - name: GENERATE_SETTINGS
            value: "false"
          - name: SERVER_PASSWORD
            valueFrom:
              secretKeyRef:
                name: windrose-secrets
                key: SERVER_PASSWORD
          - name: INVITE_CODE
            valueFrom:
              secretKeyRef:
                name: windrose-secrets
                key: INVITE_CODE
        resources:
          limits:
            cpu: 4000m
            memory: 16Gi
          requests:
            cpu: 2000m
            memory: 16Gi
        lifecycle: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File

service:
  main:
    enabled: true
    controller: main
    primary: true
    type: LoadBalancer
    loadBalancerIP: 172.31.0.33
    ports:
      game:
        enabled: true
        port: 7777
        targetPort: game
        protocol: TCP
      game-udp:
        enabled: true
        port: 7777
        targetPort: game-udp
        protocol: UDP
  extname:
    enabled: true
    primary: false
    controller: main
    type: ExternalName
    externalName: unifi-home.homelab.danmanners.com
    annotations:
      external-dns.alpha.kubernetes.io/hostname: windrose.cloud.danmanners.com
      external-dns.alpha.kubernetes.io/ttl: "300"

persistence:
  server-files:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ceph-block-retain
    accessMode: ReadWriteOnce
    size: 40Gi
    retain: true
    advancedMounts:
      main:
        main:
          - path: /home/steam/server-files
            readOnly: false
        copy-world-config:
          - path: /server-files
            readOnly: false
  world-config:
    enabled: true
    type: configMap
    name: windrose-configmap
    advancedMounts:
      main:
        copy-world-config:
          - path: /config
            readOnly: true
