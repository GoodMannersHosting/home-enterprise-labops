# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
# llama-server on Intel Arc B70 (intellectual). OpenAI-compatible API; not vLLM despite the service name.
# GPU acceleration not yet working: Mesa 24.2.8 doesn't support Battlemage PCI ID 0xe223.
# llama.cpp builds b4735-b4740 don't support qwen35/gemma4 architectures.
defaultPodOptions:
  automountServiceAccountToken: false
  enableServiceLinks: false
  restartPolicy: Always
  dnsPolicy: ClusterFirst
  nodeSelector:
    kubernetes.io/hostname: intellectual
    intel.feature.node.kubernetes.io/gpu: "true"
  securityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

controllers:
  main:
    enabled: true
    type: deployment
    replicas: 1
    revisionHistoryLimit: 2
    containers:
      core:
        ports:
          - name: http
            containerPort: &port 8080
            protocol: TCP
        image:
          repository: ghcr.io/ggml-org/llama.cpp
          # b4735 supports qwen3coder architecture; b4740 doesn't support qwen35 or gemma4
          tag: server-vulkan
          # tag: server-intel
          pullPolicy: Always
        # Image ENTRYPOINT is /app/llama-server; do not override command with sh.
        args:
          - --hf-repo
          - HauhauCS/Qwen3.6-35B-A3B-Uncensored-HauhauCS-Aggressive
          # - unsloth/Qwen3.6-27B-MTP-GGUF
          - --hf-file
          - Qwen3.6-35B-A3B-Uncensored-HauhauCS-Aggressive-Q4_K_M.gguf
          - --alias
          - "(Intel) Qwen3.6 35B A3B Uncensored HauhauCS Aggressive"
          # - Qwen3.6-27B-Q6_K.gguf
          # Meta-Llama-3.1-8B-Instruct-Q4_K_M: 4.6GB, well-supported llama architecture.
          # - --model
          # - /cache/huggingface/Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf
          # 8k ctx for 8B model.
          - --ctx-size
          - "131072"
          - --gpu-layers
          - "99"
          # Single-user chat.
          - --parallel
          - "1"
          - --reasoning-budget
          - "-1"
          - --batch-size
          - "1024"
          - --ubatch-size
          - "128"
          - --threads
          - "8"
          # Tunings
          - --temperature
          - "1.0"
          - --top-k
          - "20"
          - --top-p
          - "0.95"
          - --min-p
          - "0.00"
          - --presence-penalty
          - "1.5"
          - --repeat-penalty
          - "1.0"
          - --jinja
        env:
          # Bind via env only — image sets LLAMA_ARG_HOST; duplicating --host triggers a startup warning.
          - name: LLAMA_ARG_HOST
            value: "0.0.0.0"
          - name: LLAMA_ARG_PORT
            value: "8080"
          - name: ONEAPI_DEVICE_SELECTOR
            value: "level_zero:0"
          - name: LLAMA_ARG_MODELS_DIR
            value: "/root/.cache/huggingface"
          # - name: GGML_SYCL_ENABLE_LEVEL_ZERO
          #   value: "1"
        securityContext: {}
        resources:
          requests:
            cpu: "10000m"
            memory: "24Gi"
            gpu.intel.com/xe: "1"
          limits:
            cpu: "10000m"
            memory: "48Gi"
            gpu.intel.com/xe: "1"

service:
  core:
    enabled: true
    controller: main
    primary: true
    type: ClusterIP
    ports:
      http:
        enabled: true
        port: *port
        targetPort: http
        protocol: TCP
  public:
    enabled: true
    controller: main
    primary: false
    type: LoadBalancer
    externalTrafficPolicy: Cluster
    annotations:
      lbipam.cilium.io/ips: "172.31.0.35"
      external-dns.alpha.kubernetes.io/hostname: intel-llm.cloud.danmanners.com
      external-dns.alpha.kubernetes.io/ttl: "300"
    ports:
      http:
        enabled: true
        port: *port
        targetPort: http
        protocol: TCP

persistence:
  cache:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ceph-block-retain
    accessMode: ReadWriteOnce
    size: 100Gi
    retain: true
    advancedMounts:
      main:
        core:
          - path: /root/.cache/huggingface
            readOnly: false
  shm:
    enabled: true
    type: emptyDir
    medium: Memory
    sizeLimit: 16Gi
    advancedMounts:
      main:
        core:
          - path: /dev/shm
            readOnly: false
