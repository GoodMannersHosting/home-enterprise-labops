# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
# llama-server on Intel Arc B70 (intellectual). OpenAI-compatible API; not vLLM despite the service name.
defaultPodOptions:
  automountServiceAccountToken: false
  enableServiceLinks: false
  restartPolicy: Always
  dnsPolicy: ClusterFirst
  nodeSelector:
    kubernetes.io/hostname: intellectual
    intel.feature.node.kubernetes.io/gpu: "true"
  securityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

controllers:
  main:
    enabled: true
    type: deployment
    replicas: 1
    revisionHistoryLimit: 2
    containers:
      core:
        ports:
          - name: http
            containerPort: &port 8080
            protocol: TCP
        image:
          repository: ghcr.io/ggml-org/llama.cpp
          # SYCL / Level Zero on Arc B70. Roll back to server-vulkan if warmup crashes (see README).
          tag: server-intel
          pullPolicy: Always
        # Image ENTRYPOINT is /app/llama-server; do not override command with sh.
        args:
          - --hf-repo
          - unsloth/Qwen3.6-27B-GGUF
          # Minimum weight quant Q6_K (do not go below Q6_K / Q6_0 class for now).
          - --hf-file
          - Qwen3.6-27B-Q6_K.gguf
          # Text-only Open WebUI: -hf auto-downloads mmproj (~1.2GiB) and costs VRAM + tok/s without --no-mmproj.
          - --no-mmproj
          # 8192 tokens per slot (not "8192 MB" GPU). Lower than 32k to fit KV on 32GB VRAM.
          - --ctx-size
          - "8192"
          - --gpu-layers
          - "99"
          - --flash-attn
          - "on"
          # KV cache quant (separate from weight quant); q8_0 is fine while weights stay Q6_K.
          - --cache-type-k
          - q8_0
          - --cache-type-v
          - q8_0
          # Qwen3.6 hybrid (GDN): full SWA cache; avoids pathological partial-cache behavior.
          - --swa-full
          # Context checkpoints break on hybrid models (full re-process each turn) and cost
          # ~150MiB per checkpoint during TG — disable until server image includes PR #22929-class fix.
          - --ctx-checkpoints
          - "0"
          # Default n_parallel=4 → four 8k slots reserve KV; use 1 for single-user chat.
          - --parallel
          - "1"
          # Prompt cache default is 8192 MiB RAM (log line "limits: 8192.000 MiB") — disable for clarity/less overhead.
          - --cache-ram
          - "0"
          # Text chat: disable thinking/reasoning (replaces deprecated --chat-template-kwargs enable_thinking).
          - --reasoning
          - "off"
          # Avoid per-token checkpoint work during generation (see logs: "checkpoint 1 of 32").
          - --checkpoint-every-n-tokens
          - "-1"
          - --ubatch-size
          - "512"
        env:
          # Bind via env only — image sets LLAMA_ARG_HOST; duplicating --host triggers a startup warning.
          - name: LLAMA_ARG_HOST
            value: "0.0.0.0"
          - name: LLAMA_ARG_PORT
            value: "8080"
          # NOTE: do not set LD_LIBRARY_PATH here. The SYCL image (intel/deep-learning-essentials base)
          # already sets it to include oneAPI runtime dirs containing libsvml.so / libimf.so / libintlc.so.
          # The llama-server binary finds /app/libllama*.so via baked-in RPATH=$ORIGIN.
          # Overriding LD_LIBRARY_PATH=/app removes the oneAPI paths and breaks startup with:
          #   error while loading shared libraries: libsvml.so: cannot open shared object file
          # If you switch back to server-vulkan, re-add: { name: LD_LIBRARY_PATH, value: /app }.
          # SYCL / Level Zero (Arc via gpu.intel.com/xe + CDI). Vulkan-only vars removed.
          - name: ONEAPI_DEVICE_SELECTOR
            value: "level_zero:0"
          - name: GGML_SYCL_DEVICE
            value: "0"
          - name: SYCL_CACHE_PERSISTENT
            value: "1"
          - name: ZES_ENABLE_SYSMAN
            value: "1"
          - name: SYCL_PI_LEVEL_ZERO_USE_IMMEDIATE_COMMANDLISTS
            value: "1"
          - name: LLAMA_ARG_THREADS
            value: "16"
          - name: LLAMA_API_KEY
            valueFrom:
              secretKeyRef:
                name: intel-llm-api-key
                key: api-key
          - name: HF_HOME
            value: /cache/huggingface
        securityContext:
          allowPrivilegeEscalation: false
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: http
              initialDelaySeconds: 60
              periodSeconds: 30
              failureThreshold: 40
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: http
              initialDelaySeconds: 10
              periodSeconds: 15
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: http
              initialDelaySeconds: 30
              periodSeconds: 30
        resources:
          limits:
            gpu.intel.com/xe: "1"
            memory: 28Gi
          requests:
            gpu.intel.com/xe: "1"
            memory: 28Gi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File

service:
  core:
    enabled: true
    controller: main
    primary: true
    type: ClusterIP
    ports:
      http:
        enabled: true
        port: *port
        targetPort: http
        protocol: TCP
  public:
    enabled: true
    controller: main
    primary: false
    type: LoadBalancer
    externalTrafficPolicy: Cluster
    annotations:
      lbipam.cilium.io/ips: "172.31.0.35"
      external-dns.alpha.kubernetes.io/hostname: intel-llm.cloud.danmanners.com
      external-dns.alpha.kubernetes.io/ttl: "300"
    ports:
      http:
        enabled: true
        port: *port
        targetPort: http
        protocol: TCP

persistence:
  cache:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ceph-block-retain
    accessMode: ReadWriteOnce
    size: 100Gi
    retain: true
    advancedMounts:
      main:
        core:
          - path: /cache/huggingface
            readOnly: false
  shm:
    enabled: true
    type: emptyDir
    medium: Memory
    sizeLimit: 16Gi
    advancedMounts:
      main:
        core:
          - path: /dev/shm
            readOnly: false
