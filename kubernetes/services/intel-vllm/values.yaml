# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
# llama-server on Intel Arc B70 (intellectual). OpenAI-compatible API; not vLLM despite the service name.
defaultPodOptions:
  automountServiceAccountToken: false
  enableServiceLinks: false
  restartPolicy: Always
  dnsPolicy: ClusterFirst
  nodeSelector:
    kubernetes.io/hostname: intellectual
    intel.feature.node.kubernetes.io/gpu: "true"
  securityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

controllers:
  main:
    enabled: true
    type: deployment
    replicas: 1
    revisionHistoryLimit: 2
    containers:
      core:
        ports:
          - name: http
            containerPort: &port 8080
            protocol: TCP
        image:
          repository: ghcr.io/ggml-org/llama.cpp
          # Pinned to b4735 — b4740 has Vulkan GPU detection regression.
          # GPU acceleration not yet working on Intel Arc B70 (Battlemage/Xe2):
          #   Vulkan: missing IGC/GmmLib for Xe2 shader compilation
          #   SYCL: Level Zero only sees integrated UHD 770, not Arc B70
          # See: https://github.com/ggml-org/llama.cpp/issues/23943
          tag: server-vulkan-b4735
          pullPolicy: Always
        # Image ENTRYPOINT is /app/llama-server; do not override command with sh.
        args:
          # Gemma-4 26B A4B IT: Transformer, ~26B params per token.
          # Using local cached model path instead of --hf-repo (download hangs).
          - --model
          - /cache/huggingface/hub/models--unsloth--gemma-4-26B-A4B-it-GGUF/snapshots/3365c68df1a83799b846d05324ebfadbb8cc70b3/gemma-4-26B-A4B-it-UD-Q4_K_M.gguf
          # 32k ctx: Q4_K_M model ~15–20 GiB + q8_0 KV @32k ~2.5 GiB.
          - --ctx-size
          - "32768"
          - --gpu-layers
          - "99"
          # KV cache quant (separate from weight quant); q8_0 is fine while weights stay Q6_K.
          - --cache-type-k
          - q8_0
          - --cache-type-v
          - q8_0
          # Default n_parallel=4 → four KV slots reserve VRAM; use 1 for single-user chat.
          - --parallel
          - "1"
          # Text chat: disable reasoning/thought tags output.
          - --reasoning-format
          - none
          - --ubatch-size
          - "512"
        env:
          # Bind via env only — image sets LLAMA_ARG_HOST; duplicating --host triggers a startup warning.
          - name: LLAMA_ARG_HOST
            value: "0.0.0.0"
          - name: LLAMA_ARG_PORT
            value: "8080"
          # server-vulkan ships .so files in /app; without this, ld.so can't find libllama-common.so.0.
        securityContext: {}

service:
  core:
    enabled: true
    controller: main
    primary: true
    type: ClusterIP
    ports:
      http:
        enabled: true
        port: *port
        targetPort: http
        protocol: TCP
  public:
    enabled: true
    controller: main
    primary: false
    type: LoadBalancer
    externalTrafficPolicy: Cluster
    annotations:
      lbipam.cilium.io/ips: "172.31.0.35"
      external-dns.alpha.kubernetes.io/hostname: intel-llm.cloud.danmanners.com
      external-dns.alpha.kubernetes.io/ttl: "300"
    ports:
      http:
        enabled: true
        port: *port
        targetPort: http
        protocol: TCP

persistence:
  cache:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ceph-block-retain
    accessMode: ReadWriteOnce
    size: 100Gi
    retain: true
    advancedMounts:
      main:
        core:
          - path: /cache/huggingface
            readOnly: false
  shm:
    enabled: true
    type: emptyDir
    medium: Memory
    sizeLimit: 16Gi
    advancedMounts:
      main:
        core:
          - path: /dev/shm
            readOnly: false
