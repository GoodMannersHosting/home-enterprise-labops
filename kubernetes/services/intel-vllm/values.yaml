# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
# llama-server on Intel Arc B70 (intellectual). OpenAI-compatible API; not vLLM despite the service name.
defaultPodOptions:
  automountServiceAccountToken: false
  enableServiceLinks: false
  restartPolicy: Always
  dnsPolicy: ClusterFirst
  nodeSelector:
    kubernetes.io/hostname: intellectual
    intel.feature.node.kubernetes.io/gpu: "true"
  securityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

controllers:
  main:
    enabled: true
    type: deployment
    replicas: 1
    revisionHistoryLimit: 2
    containers:
      core:
        ports:
          - name: http
            containerPort: &port 8080
            protocol: TCP
        image:
          repository: ghcr.io/ggml-org/llama.cpp
          # Floating tag; restart pod after sync to pick up Vulkan/Xe2 fixes. Pin to a dated tag if regressions occur.
          tag: server-vulkan
          pullPolicy: Always
        # Image ENTRYPOINT is /app/llama-server; do not override command with sh.
        args:
          - --hf-repo
          - unsloth/Qwen3.6-27B-GGUF
          # Q4_K_M: best interactive speed on Arc; Q6_K is slower (change --hf-file + clear cache PVC dir if switching).
          - --hf-file
          - Qwen3.6-27B-Q4_K_M.gguf
          # Text-only Open WebUI: -hf auto-downloads mmproj (~1.2GiB) and costs VRAM + tok/s without --no-mmproj.
          - --no-mmproj
          # 8192 tokens per slot (not "8192 MB" GPU). Lower than 32k to fit KV on 32GB VRAM.
          - --ctx-size
          - "8192"
          - --gpu-layers
          - "99"
          - --flash-attn
          - "on"
          - --cache-type-k
          - q8_0
          - --cache-type-v
          - q8_0
          # Default n_parallel=4 → four 8k slots reserve KV; use 1 for single-user chat.
          - --parallel
          - "1"
          # Prompt cache default is 8192 MiB RAM (log line "limits: 8192.000 MiB") — disable for clarity/less overhead.
          - --cache-ram
          - "0"
          # Text chat: disable thinking/reasoning (replaces deprecated --chat-template-kwargs enable_thinking).
          - --reasoning
          - "off"
          # Avoid per-token checkpoint work during generation (see logs: "checkpoint 1 of 32").
          - --checkpoint-every-n-tokens
          - "-1"
          - --ubatch-size
          - "512"
        env:
          # Bind via env only — image sets LLAMA_ARG_HOST; duplicating --host triggers a startup warning.
          - name: LLAMA_ARG_HOST
            value: "0.0.0.0"
          - name: LLAMA_ARG_PORT
            value: "8080"
          - name: LD_LIBRARY_PATH
            value: /app
          # Intel Xe2 (Arc B-Series): shared-memory MMVQ path (major TG uplift on recent llama.cpp builds).
          - name: GGML_VK_MMVQ_SHMEM_STAGING
            value: "1"
          - name: LLAMA_API_KEY
            valueFrom:
              secretKeyRef:
                name: intel-llm-api-key
                key: api-key
          - name: HF_HOME
            value: /cache/huggingface
        securityContext:
          allowPrivilegeEscalation: false
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: http
              initialDelaySeconds: 60
              periodSeconds: 30
              failureThreshold: 40
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: http
              initialDelaySeconds: 10
              periodSeconds: 15
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: http
              initialDelaySeconds: 30
              periodSeconds: 30
        resources:
          limits:
            gpu.intel.com/xe: "1"
            memory: 28Gi
          requests:
            gpu.intel.com/xe: "1"
            memory: 28Gi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File

service:
  core:
    enabled: true
    controller: main
    primary: true
    type: ClusterIP
    ports:
      http:
        enabled: true
        port: *port
        targetPort: http
        protocol: TCP
  public:
    enabled: true
    controller: main
    primary: false
    type: LoadBalancer
    externalTrafficPolicy: Cluster
    annotations:
      lbipam.cilium.io/ips: "172.31.0.35"
      external-dns.alpha.kubernetes.io/hostname: intel-llm.cloud.danmanners.com
      external-dns.alpha.kubernetes.io/ttl: "300"
    ports:
      http:
        enabled: true
        port: *port
        targetPort: http
        protocol: TCP

persistence:
  cache:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ceph-block-retain
    accessMode: ReadWriteOnce
    size: 100Gi
    retain: true
    advancedMounts:
      main:
        core:
          - path: /cache/huggingface
            readOnly: false
  shm:
    enabled: true
    type: emptyDir
    medium: Memory
    sizeLimit: 16Gi
    advancedMounts:
      main:
        core:
          - path: /dev/shm
            readOnly: false
