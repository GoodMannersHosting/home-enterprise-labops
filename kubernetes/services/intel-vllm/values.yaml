# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
# llama-server on Intel Arc B70 (intellectual). OpenAI-compatible API; not vLLM despite the service name.
defaultPodOptions:
  automountServiceAccountToken: false
  enableServiceLinks: false
  restartPolicy: Always
  dnsPolicy: ClusterFirst
  nodeSelector:
    kubernetes.io/hostname: intellectual
    intel.feature.node.kubernetes.io/gpu: "true"
  securityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

controllers:
  main:
    enabled: true
    type: deployment
    replicas: 1
    revisionHistoryLimit: 2
    containers:
      core:
        ports:
          - name: http
            containerPort: &port 8080
            protocol: TCP
        image:
          repository: ghcr.io/ggml-org/llama.cpp
          tag: server-vulkan
          pullPolicy: IfNotPresent
        # Image ENTRYPOINT is /app/llama-server; do not override command with sh.
        args:
          - --host
          - "0.0.0.0"
          - --port
          - "8080"
          - --hf-repo
          - unsloth/Qwen3.6-27B-GGUF
          - --hf-file
          - Qwen3.6-27B-Q6_K.gguf
          - --ctx-size
          - "32768"
          - --gpu-layers
          - "99"
        env:
          - name: LD_LIBRARY_PATH
            value: /app
          - name: LLAMA_API_KEY
            valueFrom:
              secretKeyRef:
                name: intel-llm-api-key
                key: api-key
          - name: HF_HOME
            value: /cache/huggingface
        securityContext:
          allowPrivilegeEscalation: false
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: http
              initialDelaySeconds: 60
              periodSeconds: 30
              failureThreshold: 40
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: http
              initialDelaySeconds: 10
              periodSeconds: 15
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: http
              initialDelaySeconds: 30
              periodSeconds: 30
        resources:
          limits:
            gpu.intel.com/xe: "1"
            memory: 28Gi
          requests:
            gpu.intel.com/xe: "1"
            memory: 28Gi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File

service:
  core:
    enabled: true
    controller: main
    primary: true
    type: ClusterIP
    ports:
      http:
        enabled: true
        port: *port
        targetPort: http
        protocol: TCP
  public:
    enabled: true
    controller: main
    primary: false
    type: LoadBalancer
    externalTrafficPolicy: Cluster
    annotations:
      lbipam.cilium.io/ips: "172.31.0.35"
      external-dns.alpha.kubernetes.io/hostname: intel-llm.cloud.danmanners.com
      external-dns.alpha.kubernetes.io/ttl: "300"
    ports:
      http:
        enabled: true
        port: *port
        targetPort: http
        protocol: TCP

persistence:
  cache:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ceph-block-retain
    accessMode: ReadWriteOnce
    size: 100Gi
    retain: true
    advancedMounts:
      main:
        core:
          - path: /cache/huggingface
            readOnly: false
  shm:
    enabled: true
    type: emptyDir
    medium: Memory
    sizeLimit: 16Gi
    advancedMounts:
      main:
        core:
          - path: /dev/shm
            readOnly: false
