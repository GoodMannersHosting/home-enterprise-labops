# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
# llama-server on Intel Arc B70 (intellectual). OpenAI-compatible API; not vLLM despite the service name.
# GPU acceleration not yet working: Mesa 24.2.8 doesn't support Battlemage PCI ID 0xe223.
# llama.cpp builds b4735-b4740 don't support qwen35/gemma4 architectures.
defaultPodOptions:
  automountServiceAccountToken: false
  enableServiceLinks: false
  restartPolicy: Always
  dnsPolicy: ClusterFirst
  nodeSelector:
    kubernetes.io/hostname: intellectual
    intel.feature.node.kubernetes.io/gpu: "true"
  securityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

controllers:
  main:
    enabled: true
    type: deployment
    replicas: 1
    revisionHistoryLimit: 2
    containers:
      core:
        ports:
          - name: http
            containerPort: &port 8080
            protocol: TCP
        image:
          repository: ghcr.io/ggml-org/llama.cpp
          # b4735 supports qwen3coder architecture; b4740 doesn't support qwen35 or gemma4
          tag: server-vulkan-b4735
          pullPolicy: Always
        # Image ENTRYPOINT is /app/llama-server; do not override command with sh.
        args:
          # Qwen3-Coder-30B-A3B: MoE transformer, using HF repo (not Unsloth — their GGUF uses qwen3moe arch not supported by b4735).
          - --hf-repo
          - Qwen/Qwen3-Coder-30B-A3B-Instruct
          - --hf-file
          - Qwen3-Coder-30B-A3B-Instruct-Q6_K.gguf
          # 4k ctx to stay within memory limits.
          - --ctx-size
          - "4096"
          - --gpu-layers
          - "0"
          # KV cache quant; q8_0 is fine.
          - --cache-type-k
          - q8_0
          - --cache-type-v
          - q8_0
          # Single-user chat.
          - --parallel
          - "1"
          # Disable reasoning/thought tags.
          - --reasoning-format
          - none
          - --ubatch-size
          - "512"
        env:
          # Bind via env only — image sets LLAMA_ARG_HOST; duplicating --host triggers a startup warning.
          - name: LLAMA_ARG_HOST
            value: "0.0.0.0"
          - name: LLAMA_ARG_PORT
            value: "8080"
          # server-vulkan ships .so files in /app; without this, ld.so can't find libllama-common.so.0.
        securityContext: {}

service:
  core:
    enabled: true
    controller: main
    primary: true
    type: ClusterIP
    ports:
      http:
        enabled: true
        port: *port
        targetPort: http
        protocol: TCP
  public:
    enabled: true
    controller: main
    primary: false
    type: LoadBalancer
    externalTrafficPolicy: Cluster
    annotations:
      lbipam.cilium.io/ips: "172.31.0.35"
      external-dns.alpha.kubernetes.io/hostname: intel-llm.cloud.danmanners.com
      external-dns.alpha.kubernetes.io/ttl: "300"
    ports:
      http:
        enabled: true
        port: *port
        targetPort: http
        protocol: TCP

persistence:
  cache:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ceph-block-retain
    accessMode: ReadWriteOnce
    size: 100Gi
    retain: true
    advancedMounts:
      main:
        core:
          - path: /cache/huggingface
            readOnly: false
  shm:
    enabled: true
    type: emptyDir
    medium: Memory
    sizeLimit: 16Gi
    advancedMounts:
      main:
        core:
          - path: /dev/shm
            readOnly: false
