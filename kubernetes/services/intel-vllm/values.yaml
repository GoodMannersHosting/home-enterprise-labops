# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
# llama-server on Intel Arc B70 (intellectual). OpenAI-compatible API; not vLLM despite the service name.
defaultPodOptions:
  automountServiceAccountToken: false
  enableServiceLinks: false
  restartPolicy: Always
  dnsPolicy: ClusterFirst
  nodeSelector:
    kubernetes.io/hostname: intellectual
    intel.feature.node.kubernetes.io/gpu: "true"
  securityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

controllers:
  main:
    enabled: true
    type: deployment
    replicas: 1
    revisionHistoryLimit: 2
    containers:
      core:
        ports:
          - name: http
            containerPort: &port 8080
            protocol: TCP
        image:
          repository: ghcr.io/ggml-org/llama.cpp
          # Back on Vulkan: server-intel (SYCL) crashes silently during warmup on Qwen3.6 hybrid GDN
          # (ggml-org/llama.cpp#21474). Qwen3-Coder-30B-A3B is a standard MoE transformer, no SSM/GDN.
          tag: server-vulkan
          pullPolicy: Always
        # Image ENTRYPOINT is /app/llama-server; do not override command with sh.
        args:
          # Gemma-4 26B A4B IT: Transformer, ~26B params per token → fast generation on B70 Vulkan.
          # Standard transformer (no GDN/SSM), so SYCL-only Qwen3.6 warmup bug doesn't apply.
          - --hf-repo
          - unsloth/gemma-4-26B-A4B-it-GGUF
          # Unsloth Dynamic Q4_K_M: Balanced quality and size for Gemma-4.
          - --hf-file
          - gemma-4-26B-A4B-it-UD-Q4_K_M.gguf
          # 32k ctx fits comfortably: Q4_K_M model ~15–20 GiB + q8_0 KV @32k ~2.5 GiB on 32 GiB Arc B70.
          - --ctx-size
          - "32768"
          - --gpu-layers
          - "99"
          - --flash-attn
          - "on"
          # KV cache quant (separate from weight quant); q8_0 is fine while weights stay Q6_K.
          - --cache-type-k
          - q8_0
          - --cache-type-v
          - q8_0
          # Default n_parallel=4 → four KV slots reserve VRAM; use 1 for single-user chat.
          - --parallel
          - "1"
          # Prompt cache default is 8192 MiB RAM (log line "limits: 8192.000 MiB") — disable for clarity/less overhead.
          - --cache-ram
          - "0"
          # Text chat: disable thinking/reasoning (replaces deprecated --chat-template-kwargs enable_thinking).
          - --reasoning
          - "off"
          - --ubatch-size
          - "512"
        env:
          # Bind via env only — image sets LLAMA_ARG_HOST; duplicating --host triggers a startup warning.
          - name: LLAMA_ARG_HOST
            value: "0.0.0.0"
          - name: LLAMA_ARG_PORT
            value: "8080"
          # server-vulkan ships .so files in /app; without this, ld.so can't find libllama-common.so.0.
          # If we ever switch back to server-intel (SYCL), REMOVE this entry — the SYCL base image's
          # own LD_LIBRARY_PATH must remain intact for libsvml.so/libimf.so/libintlc.so to resolve.
          - name: LD_LIBRARY_PATH
            value: /app
          # Vulkan ICD path for Intel GPU
          - name: VK_ICD_FILENAMES
            value: /usr/share/vulkan/icd.d/intel_icd.json
        securityContext:
          privileged: true

service:
  core:
    enabled: true
    controller: main
    primary: true
    type: ClusterIP
    ports:
      http:
        enabled: true
        port: *port
        targetPort: http
        protocol: TCP
  public:
    enabled: true
    controller: main
    primary: false
    type: LoadBalancer
    externalTrafficPolicy: Cluster
    annotations:
      lbipam.cilium.io/ips: "172.31.0.35"
      external-dns.alpha.kubernetes.io/hostname: intel-llm.cloud.danmanners.com
      external-dns.alpha.kubernetes.io/ttl: "300"
    ports:
      http:
        enabled: true
        port: *port
        targetPort: http
        protocol: TCP

persistence:
  cache:
    enabled: true
    type: persistentVolumeClaim
    storageClass: ceph-block-retain
    accessMode: ReadWriteOnce
    size: 100Gi
    retain: true
    advancedMounts:
      main:
        core:
          - path: /cache/huggingface
            readOnly: false
  dri:
    enabled: true
    type: hostPath
    hostPath: /dev/dri
    advancedMounts:
      main:
        core:
          - path: /dev/dri
            readOnly: false
  shm:
    enabled: true
    type: emptyDir
    medium: Memory
    sizeLimit: 16Gi
    advancedMounts:
      main:
        core:
          - path: /dev/shm
            readOnly: false
