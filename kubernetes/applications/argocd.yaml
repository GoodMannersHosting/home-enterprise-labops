---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  labels:
    chartVersion: &chartVersion "9.7.1"
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  sources:
    - repoURL: &repo https://github.com/GoodMannersHosting/home-enterprise-labops.git
      targetRevision: main
      ref: values
    - repoURL: *repo
      targetRevision: main
      path: kubernetes/core/argocd
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: *chartVersion
      helm:
        skipCrds: true
        valueFiles:
          - $values/kubernetes/core/argocd/values.yaml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
